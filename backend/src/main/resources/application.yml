spring:
  application:
    name: GridWar
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gridwar}
    username: ${POSTGRES_USER:gridwar}
    password: ${POSTGRES_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  session:
    store-type: redis
    cookie:
      http-only: true
      same-site: strict
      max-age: 86400
  threads.virtual.enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  grid-size: ${GRID_SIZE:50}
  cooldown-ms: ${CAPTURE_COOLDOWN_MS:3000}
  cors-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

management:
  endpoints.web.exposure.include: health,info
